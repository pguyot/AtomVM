name: Build and Test

on:
  push:
    paths-ignore:
      - 'src/platforms/emscripten/**'
      - 'src/platforms/esp32/**'
      - 'src/platforms/rp2/**'
      - 'src/platforms/stm32/**'
      - 'doc/**'
      - 'LICENSES/**'
      - '*.Md'
      - '*.md'
  pull_request:
    paths-ignore:
      - 'src/platforms/emscripten/**'
      - 'src/platforms/esp32/**'
      - 'src/platforms/rp2/**'
      - 'src/platforms/stm32/**'
      - 'doc/**'
      - 'LICENSES/**'
      - '*.Md'
      - '*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref != 'refs/heads/main' && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ${{ matrix.os || 'ubuntu-24.04' }}
    strategy:

      fail-fast: false

      matrix:
        include:
        # JIT build with OTP-28 (x86_64)
        - os: "ubuntu-24.04"
          cc: "cc"
          cxx: "c++"
          cflags: ""
          otp: "28"
          elixir_version: "1.17"
          rebar3_version: "3.24.0"
          cmake_opts_other: "-DAVM_DISABLE_JIT=OFF"
          jit_target_arch: "x86_64"

        # JIT build with OTP-28 (aarch64)
        - os: "ubuntu-24.04-arm"
          cc: "cc"
          cxx: "c++"
          cflags: ""
          otp: "28"
          elixir_version: "1.17"
          rebar3_version: "3.24.0"
          cmake_opts_other: "-DAVM_DISABLE_JIT=OFF"
          jit_target_arch: "aarch64"

    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
      CFLAGS: ${{ matrix.cflags }}
      CXXFLAGS: ${{ matrix.cflags }}
      DEBIAN_FRONTEND: noninteractive
      TZ: "Etc/UTC"

    steps:
    # Setup
    - name: "APT update"
      run: sudo apt update -y

    - name: "Install deps"
      run: |
        sudo apt install -y cmake gperf zlib1g-dev doxygen libmbedtls-dev libc6-dbg

    - name: "Checkout repo"
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - uses: erlef/setup-beam@v1
      with:
        otp-version: ${{ matrix.otp }}
        elixir-version: ${{ matrix.elixir_version }}
        rebar3-version: ${{ matrix.rebar3_version }}
        hexpm-mirrors: |
          https://builds.hex.pm
          https://repo.hex.pm
          https://cdn.jsdelivr.net/hex

    # Builder info
    - name: "System info"
      run: |
        echo "**uname:**"
        uname -a
        echo "**libc version:**"
        ldd --version
        echo "**C Compiler version:**"
        $CC --version
        $CXX --version
        echo "**Linker version:**"
        ld --version
        echo "**CMake version:**"
        cmake --version
        echo "**OTP version:**"
        cat $(dirname $(which erlc))/../releases/RELEASES || true

    # Build
    - name: "Build: create build dir"
      run: mkdir build

    - uses: actions/cache@v4
      id: cache
      with:
        path: 'build/tests/**/*.beam'
        key: ${{ matrix.otp }}-${{ hashFiles('**/build-and-test.yaml', 'tests/**/*.erl', 'tests/**/*.hrl', 'tests/**/*.ex') }}-${{ matrix.jit_target_arch || 'nojit' }}

    - name: "Build: run cmake"
      working-directory: build
      run: |
        cmake ${{ matrix.cmake_opts_other }} ..
        # git clone will use more recent timestamps than cached beam files
        # touch them so we can benefit from the cache and avoid costly beam file rebuild.
        find . -name '*.beam' -exec touch {} \;

    - name: "Build: run make"
      working-directory: build
      run: make -j3

    - name: "Build: run dialyzer"
      working-directory: build
      run: make dialyzer

    # Test
    - name: "Test: test-erlang"
      timeout-minutes: 10
      working-directory: build
      run: |
        ulimit -c unlimited
        ./tests/test-erlang -s prime_smp

    - name: "Test: test-enif"
      working-directory: build
      run: |
        ulimit -c unlimited
        ./tests/test-enif

    - name: "Test: test-heap"
      working-directory: build
      run: |
        ulimit -c unlimited
        ./tests/test-heap

    - name: "Test: test-mailbox"
      working-directory: build
      run: |
        ulimit -c unlimited
        ./tests/test-mailbox

    - name: "Test: test-structs"
      timeout-minutes: 10
      working-directory: build
      run: |
        ulimit -c unlimited
        ./tests/test-structs

    - name: "Test: test_etest.avm"
      timeout-minutes: 5
      working-directory: build
      run: |
        ulimit -c unlimited
        ./src/AtomVM ./tests/libs/etest/test_etest.avm

    - name: "Test: test_estdlib.avm"
      timeout-minutes: 20
      working-directory: build
      run: |
        ulimit -c unlimited
        ./src/AtomVM ./tests/libs/estdlib/test_estdlib.avm

    - name: "Test: test_eavmlib.avm"
      timeout-minutes: 10
      working-directory: build
      run: |
        ulimit -c unlimited
        ./src/AtomVM ./tests/libs/eavmlib/test_eavmlib.avm

    - name: "Test: test_jit.avm"
      timeout-minutes: 60
      working-directory: build
      run: |
        ulimit -c unlimited
        ./src/AtomVM tests/libs/jit/test_jit.avm

    - name: "Test: test_alisp.avm"
      timeout-minutes: 10
      working-directory: build
      run: |
        ulimit -c unlimited
        ./src/AtomVM ./tests/libs/alisp/test_alisp.avm

    - name: "Install and smoke test"
      working-directory: build
      run: |
        ulimit -c unlimited
        sudo PATH=${PATH} make install
        atomvm examples/erlang/hello_world.avm
        atomvm -v
        atomvm -h

    - name: "Run coredumpctl info"
      if: ${{ failure() }}
      run: |
        # Wait until systemd-coredump finished
        while ps x | grep -cE 'systemd-[c]oredump'; do
            echo systemd-coredump is still running
            sleep 1
        done
        # info works on all versions of ubuntu
        coredumpctl info || true
        # The following only works on recent versions of ubuntu
        coredumpctl debug --debugger-arguments="-batch -ex 'info all-registers'" || true
        coredumpctl debug --debugger-arguments="-batch -ex 'info threads'" || true
        coredumpctl debug --debugger-arguments="-batch -ex 'thread apply all bt full'" || true
        coredumpctl debug --debugger-arguments='-batch -ex "display /10i $pc"' || true
        coredumpctl dump -o core.dump || true
        if [ -e core.dump ]; then
            mkdir core
            mv core.dump core/
            cp build/src/AtomVM core/
            cp build/tests/test-* core/
        fi

    - name: "Upload any dumped core"
      uses: actions/upload-artifact@v4
      if: ${{ failure() }}
      with:
        name: core-${{ matrix.os }}-${{ matrix.cc }}-${{ matrix.otp }}-${{ github.run_id }}-${{ github.run_attempt }}
        path: |
            core/*
        retention-days: 5
